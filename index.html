<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给Agent装上工具箱</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-container">
        <header class="app-header">
            <div class="logo-section">
                <div class="logo-icon">
                    <div class="logo-inner"></div>
                </div>
                <div class="logo-text">
                    <h1>Agent Toolbox</h1>
                    <span class="subtitle">智能工具调用系统</span>
                </div>
            </div>
            <div class="status-bar">
                <div class="status-indicator active">
                    <span class="pulse"></span>
                    <span>Agent 在线</span>
                </div>
                <div class="tool-count">
                    <span class="count-num" id="toolCount">5</span>
                    <span class="count-label">可用工具</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <aside class="toolbox-panel">
                <div class="panel-header">
                    <h2>🧰 工具箱</h2>
                    <button class="toggle-tools" id="toggleTools">收起</button>
                </div>
                <div class="tools-list" id="toolsList">
                    <div class="tool-card" data-tool="calculator">
                        <div class="tool-icon">🔢</div>
                        <div class="tool-info">
                            <span class="tool-name">计算器</span>
                            <span class="tool-desc">数学运算</span>
                        </div>
                        <div class="tool-badge">常用</div>
                    </div>
                    <div class="tool-card" data-tool="search">
                        <div class="tool-icon">🔍</div>
                        <div class="tool-info">
                            <span class="tool-name">搜索</span>
                            <span class="tool-desc">网络搜索</span>
                        </div>
                    </div>
                    <div class="tool-card" data-tool="weather">
                        <div class="tool-icon">🌤️</div>
                        <div class="tool-info">
                            <span class="tool-name">天气</span>
                            <span class="tool-desc">查询天气</span>
                        </div>
                    </div>
                    <div class="tool-card" data-tool="translate">
                        <div class="tool-icon">🌐</div>
                        <div class="tool-info">
                            <span class="tool-name">翻译</span>
                            <span class="tool-desc">语言翻译</span>
                        </div>
                    </div>
                    <div class="tool-card" data-tool="code">
                        <div class="tool-icon">💻</div>
                        <div class="tool-info">
                            <span class="tool-name">代码</span>
                            <span class="tool-desc">代码执行</span>
                        </div>
                    </div>
                </div>
                <div class="agent-thoughts" id="agentThoughts">
                    <div class="thoughts-header">
                        <span>🧠 Agent思考过程</span>
                    </div>
                    <div class="thoughts-content" id="thoughtsContent">
                        <div class="thought-item idle">等待输入...</div>
                    </div>
                </div>
            </aside>

            <section class="chat-area">
                <div class="chat-messages" id="chatMessages">
                    <div class="message message-agent">
                        <div class="message-avatar">🤖</div>
                        <div class="message-content">
                            <div class="message-bubble">
                                你好！我是 Agent，拥有多种工具能力。我可以：
                                <ul>
                                    <li>🧮 使用计算器进行数学运算</li>
                                    <li>🔍 搜索网络信息</li>
                                    <li>🌤️ 查询天气预报</li>
                                    <li>🌐 翻译不同语言</li>
                                    <li>💻 执行代码</li>
                                </ul>
                                请输入问题或点击右侧工具开始体验！
                            </div>
                            <span class="message-time">现在</span>
                        </div>
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <input type="text" id="userInput" placeholder="输入您的问题..." autocomplete="off">
                        <button class="send-btn" id="sendBtn">
                            <span>➤</span>
                        </button>
                    </div>
                    <div class="quick-actions">
                        <button class="quick-btn" data-query="计算 123 * 456 + 789">🧮 试试计算</button>
                        <button class="quick-btn" data-query="搜索 AI 发展趋势">🔍 试试搜索</button>
                        <button class="quick-btn" data-query="北京天气怎么样">🌤️ 查天气</button>
                    </div>
                </div>
            </section>
        </main>

        <div class="tool-call-modal" id="toolModal">
            <div class="modal-content">
                <div class="modal-header">
                    <span class="modal-icon" id="modalIcon">🔧</span>
                    <span class="modal-title" id="modalTitle">调用工具</span>
                    <button class="modal-close" id="modalClose">×</button>
                </div>
                <div class="modal-body">
                    <div class="tool-call-info">
                        <div class="info-row">
                            <span class="label">工具名称:</span>
                            <span class="value" id="toolName">-</span>
                        </div>
                        <div class="info-row">
                            <span class="label">输入参数:</span>
                            <pre class="value" id="toolInput">-</pre>
                        </div>
                        <div class="info-row">
                            <span class="label">执行状态:</span>
                            <span class="value status" id="toolStatus">准备中</span>
                        </div>
                        <div class="info-row">
                            <span class="label">执行结果:</span>
                            <pre class="value result" id="toolResult">-</pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
