<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给Agent装上工具箱 - 智能助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-effects">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>
    
    <div class="container">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🔧</span>
                <h1>Agent 工具箱</h1>
            </div>
            <p class="subtitle">智能工具调用系统 - 基于LangChain风格</p>
        </header>

        <main class="main-content">
            <!-- 工具展示区 -->
            <section class="tools-panel">
                <h2>可用工具 <span class="tools-count" id="toolsCount">0</span></h2>
                <div class="tools-grid" id="toolsGrid">
                    <!-- Tools will be rendered here -->
                </div>
            </section>

            <!-- 对话区域 -->
            <section class="chat-panel">
                <div class="chat-header">
                    <span class="chat-icon">🤖</span>
                    <h3>Agent 对话</h3>
                    <button class="clear-btn" id="clearChat" title="清空对话">🗑️</button>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-message">
                        <p>👋 欢迎使用 Agent 工具箱！</p>
                        <p>我可以帮您完成以下任务：</p>
                        <ul>
                            <li>🧮 <strong>计算</strong>：输入数学表达式，如 "2+3*4"</li>
                            <li>🌤️ <strong>天气</strong>：查询城市天气，如 "北京天气"</li>
                            <li>🔍 <strong>搜索</strong>：搜索知识，如 "什么是人工智能"</li>
                            <li>📐 <strong>转换</strong>：单位转换，如 "100公里转英里"</li>
                            <li>📝 <strong>分析</strong>：文本分析，如 "分析: Hello World"</li>
                        </ul>
                    </div>
                </div>
                <div class="chat-input-area">
                    <div class="input-wrapper">
                        <input type="text" id="userInput" placeholder="输入您的问题..." autocomplete="off">
                        <button class="send-btn" id="sendBtn">
                            <span>发送</span>
                            <span class="send-icon">➤</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Agent 思考过程 -->
            <section class="thinking-panel" id="thinkingPanel">
                <h3>🔮 Agent 思考过程</h3>
                <div class="thinking-content" id="thinkingContent">
                    <p class="thinking-idle">等待输入...</p>
                </div>
            </section>
        </main>

        <!-- 工具执行结果弹窗 -->
        <div class="modal" id="toolModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">工具执行结果</h3>
                    <button class="modal-close" id="modalClose">×</button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- Tool result content -->
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
